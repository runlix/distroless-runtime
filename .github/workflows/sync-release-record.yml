name: Sync Release Record

on:
  workflow_run:
    workflows:
      - Release
    branches:
      - release
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  sync:
    concurrency:
      group: sync-release-record-${{ github.repository }}
      cancel-in-progress: false
    uses: runlix/build-workflow/.github/workflows/sync-release-record.yml@d51a06af75b353f4a50808cbbd816752ac7eca8c
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools@sha256:77f0f999885f898c992cded0d76c3e5f12d74e12080be44b9ea316f6a5a94bdf
    secrets:
      RUNLIX_APP_ID: ${{ secrets.RUNLIX_APP_ID }}
      RUNLIX_PRIVATE_KEY: ${{ secrets.RUNLIX_PRIVATE_KEY }}
