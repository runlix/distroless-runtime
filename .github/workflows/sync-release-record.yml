name: Sync Release Record

on:
  workflow_run:
    workflows:
      - Release
    branches:
      - release
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  sync:
    uses: runlix/build-workflow/.github/workflows/sync-release-record.yml@79ac2b17f17ff48da372368b480c29c213d9b24d
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools@sha256:ab9d5a96364eff26b4a01af6c8c10d213a303371f39596873b4f3927e3d74082
