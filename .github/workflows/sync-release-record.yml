name: Sync Release Record

on:
  workflow_run:
    workflows:
      - Release
    branches:
      - release
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  sync:
    uses: runlix/build-workflow/.github/workflows/sync-release-record.yml@8e11feb89cb8e79b5a1419b17e8a4d48372f02c0
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools@sha256:f7eb27daa3d5460a5408868bb887fad73bc00b5816513265d1657570bb3ea5a1
    secrets:
      RUNLIX_APP_ID: ${{ secrets.RUNLIX_APP_ID }}
      RUNLIX_PRIVATE_KEY: ${{ secrets.RUNLIX_PRIVATE_KEY }}
