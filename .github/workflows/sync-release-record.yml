name: Sync Release Record

on:
  workflow_run:
    workflows:
      - Release
    branches:
      - release
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  sync:
    concurrency:
      group: sync-release-record-${{ github.repository }}
      cancel-in-progress: false
    uses: runlix/build-workflow/.github/workflows/sync-release-record.yml@afb7a442788d403e7b015d95244999c4c66e0d00
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools@sha256:79622d41431ba69f1a9e580cca07694247618a76b7576f9628163a243e6713e7
    secrets:
      RUNLIX_APP_ID: ${{ secrets.RUNLIX_APP_ID }}
      RUNLIX_PRIVATE_KEY: ${{ secrets.RUNLIX_PRIVATE_KEY }}
