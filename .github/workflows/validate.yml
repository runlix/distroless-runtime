name: Validate

on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize, reopened]
    paths:
      - ".ci/config.json"
      - ".ci/*.sh"
      - ".dockerignore"
      - "linux-*.Dockerfile"
      - ".github/workflows/validate.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    uses: runlix/build-workflow/.github/workflows/validate.yml@afb7a442788d403e7b015d95244999c4c66e0d00
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools@sha256:79622d41431ba69f1a9e580cca07694247618a76b7576f9628163a243e6713e7
