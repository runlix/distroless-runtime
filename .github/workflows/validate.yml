name: Validate

on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize, reopened]
    paths:
      - ".ci/config.json"
      - ".ci/*.sh"
      - ".dockerignore"
      - "linux-*.Dockerfile"
      - ".github/workflows/validate.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    uses: runlix/build-workflow/.github/workflows/validate.yml@8e11feb89cb8e79b5a1419b17e8a4d48372f02c0
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools@sha256:f7eb27daa3d5460a5408868bb887fad73bc00b5816513265d1657570bb3ea5a1
