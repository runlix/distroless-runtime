name: Release

on:
  push:
    branches:
      - release
    paths:
      - ".ci/config.json"
      - ".ci/*.sh"
      - ".dockerignore"
      - "linux-*.Dockerfile"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: runlix/build-workflow/.github/workflows/release.yml@afb7a442788d403e7b015d95244999c4c66e0d00
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools@sha256:79622d41431ba69f1a9e580cca07694247618a76b7576f9628163a243e6713e7
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
