name: Release

on:
  push:
    branches:
      - release
      - side/ci-v2-release
    paths:
      - ".ci/config.json"
      - ".ci/docker-matrix.json"
      - ".ci/README.md"
      - "linux-*.Dockerfile"
      - ".github/workflows/release.yml"

permissions:
  contents: read
  packages: write

jobs:
  release:
    # Keep tooling-ref equal to the SHA pinned in uses:.
    uses: runlix/build-workflow/.github/workflows/release-v2.yml@83f522fecbdd77b7875e4e474ddbdc78d978ac3e
    with:
      tooling-ref: 83f522fecbdd77b7875e4e474ddbdc78d978ac3e
      config-path: .ci/config.json
      legacy-matrix-path: .ci/docker-matrix.json
      validate-legacy-matrix: true
      release-artifact-name: release-metadata
