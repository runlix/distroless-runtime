name: Release

on:
  push:
    branches:
      - release
      - side/ci-v2-release
    paths:
      - ".ci/config.json"
      - ".ci/README.md"
      - "linux-*.Dockerfile"
      - ".github/workflows/release.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      short_sha: ${{ steps.context.outputs.short_sha }}
      source_sha: ${{ steps.context.outputs.source_sha }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout build workflow tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: side/ci-v2-prototype
          path: .tooling

      - name: Resolve source context
        id: context
        run: |
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate CI config
        run: .tooling/prototypes/ci-v2/scripts/validate-config.sh .ci/config.json

      - name: Plan build matrix
        id: plan
        run: |
          short_sha="${{ steps.context.outputs.short_sha }}"
          echo "matrix=$(.tooling/prototypes/ci-v2/scripts/plan-matrix.sh .ci/config.json "$short_sha")" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout build workflow tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: side/ci-v2-prototype
          path: .tooling

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push target
        run: |
          .tooling/prototypes/ci-v2/scripts/build-target.sh \
            .ci/config.json \
            "${{ matrix.name }}" \
            release \
            "${{ needs.plan.outputs.short_sha }}"

  publish:
    needs:
      - plan
      - build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout build workflow tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: side/ci-v2-prototype
          path: .tooling

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Create manifests
        run: |
          .tooling/prototypes/ci-v2/scripts/create-manifests.sh \
            .ci/config.json \
            "${{ needs.plan.outputs.short_sha }}" \
            manifests-created.txt

      - name: Render release metadata
        run: |
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          .tooling/prototypes/ci-v2/scripts/render-release-metadata.sh \
            .ci/config.json \
            "${{ needs.plan.outputs.source_sha }}" \
            "$published_at" > release-metadata.json

      - name: Upload release metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-metadata
          path: release-metadata.json
          retention-days: 7
