name: Release

on:
  push:
    branches:
      - release
    paths:
      - ".ci/config.json"
      - ".ci/*.sh"
      - ".dockerignore"
      - "linux-*.Dockerfile"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: runlix/build-workflow/.github/workflows/release.yml@a65b382745fba78f2f01ef7657824a9467c0c55b
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools@sha256:daf017419f6bffdb2de600bcfdbff359827b82d5ca05ef8828b21dd29fea1a2f
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
