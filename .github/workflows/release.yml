name: Release

on:
  push:
    branches:
      - release
    paths:
      - ".ci/config.json"
      - ".ci/*.sh"
      - ".dockerignore"
      - "linux-*.Dockerfile"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: runlix/build-workflow/.github/workflows/release.yml@86e3cbfc7b3a8093801f36bbfb2d7245bb50cb0f
    with:
      build-workflow-ref: 86e3cbfc7b3a8093801f36bbfb2d7245bb50cb0f
