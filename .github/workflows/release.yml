name: Release

on:
  push:
    branches:
      - release
    paths:
      - ".ci/config.json"
      - ".ci/*.sh"
      - ".dockerignore"
      - "linux-*.Dockerfile"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: runlix/build-workflow/.github/workflows/release.yml@539aeec8eca2dd0f942963b87d32c171487ff2f2
    secrets: inherit
