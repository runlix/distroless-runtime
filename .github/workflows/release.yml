name: Release

on:
  push:
    branches:
      - release
    paths:
      - ".ci/config.json"
      - ".ci/*.sh"
      - ".dockerignore"
      - "linux-*.Dockerfile"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: runlix/build-workflow/.github/workflows/release.yml@f6cda05c2471728d19ced0928f78109e26e08c97
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools:sha-f6cda05c2471728d19ced0928f78109e26e08c97
