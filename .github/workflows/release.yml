name: Release

on:
  push:
    branches:
      - release
    paths:
      - ".ci/config.json"
      - ".ci/README.md"
      - "linux-*.Dockerfile"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: runlix/build-workflow/.github/workflows/release-v2.yml@987962fa73ce073035aee061d6b211a7d803275b
    with:
      config-path: .ci/config.json
      release-artifact-name: release-metadata
