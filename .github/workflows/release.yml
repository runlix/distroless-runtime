name: Release

on:
  push:
    branches:
      - release
    paths:
      - ".ci/config.json"
      - ".ci/README.md"
      - "linux-*.Dockerfile"
      - ".github/workflows/release.yml"

permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: runlix/build-workflow/.github/workflows/release-v2.yml@2e7c3cf52b52c0f88d5fe16b4c1e85d1162cc2e5
    with:
      config-path: .ci/config.json
      release-artifact-name: release-metadata
