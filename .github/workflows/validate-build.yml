name: Validate Build

on:
  pull_request:
    branches:
      - release
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".ci/build.json"
      - ".ci/*.sh"
      - ".dockerignore"
      - "linux-*.Dockerfile"
      - ".github/workflows/validate-build.yml"
      - ".github/workflows/publish-release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    uses: runlix/build-workflow/.github/workflows/validate-build.yml@4db4d106a12f2a72841e3768c4ef31b71d2bde28
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools:sha-2ef0415ea13f8913639851fd68957beec8abb635
