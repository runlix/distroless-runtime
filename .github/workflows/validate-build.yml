name: Validate Build

on:
  pull_request:
    branches:
      - release
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".ci/build.json"
      - ".ci/*.sh"
      - ".dockerignore"
      - "linux-*.Dockerfile"
      - ".github/workflows/validate-build.yml"
      - ".github/workflows/publish-release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    uses: runlix/build-workflow/.github/workflows/validate-build.yml@2e03098fb175a5d7493930e7961c99b6313e93a5
