name: Validate Main Sync Wrapper

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/sync-release-record.yml"
      - ".github/workflows/validate-main-sync-wrapper.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    uses: runlix/build-workflow/.github/workflows/validate-sync-wrapper.yml@cb0c42e32966588c5e5b03cfea31d67e1749628a
    with:
      workflow-path: .github/workflows/sync-release-record.yml
