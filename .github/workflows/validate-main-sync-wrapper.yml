name: Validate Main Sync Wrapper

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/sync-release-record.yml"
      - ".github/workflows/validate-main-sync-wrapper.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    uses: runlix/build-workflow/.github/workflows/validate-sync-wrapper.yml@d93b3a9c7e6fcb970e0f8f4ef5febca6ed16a6fc
    with:
      workflow-path: .github/workflows/sync-release-record.yml
