name: Validate Release Metadata

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "release.json"
      - ".github/workflows/validate-release-metadata.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release-metadata:
    name: validate-release-metadata
    uses: runlix/build-workflow/.github/workflows/validate-release-metadata.yml@0c678540f996a8dfe57235045510980ef9700c77
    with:
      release-json-path: release.json
      tool-image: ghcr.io/runlix/build-workflow-tools:sha-0c678540f996a8dfe57235045510980ef9700c77
