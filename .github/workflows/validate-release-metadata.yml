name: Validate Release Metadata

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "release.json"
      - ".github/workflows/validate-release-metadata.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate-release-metadata:
    name: validate-release-metadata
    uses: runlix/build-workflow/.github/workflows/validate-release-metadata.yml@99b35a4d800b0482f5e098743c927f505690d2d8
    with:
      release-json-path: release.json
