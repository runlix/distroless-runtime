name: Validate Release Metadata

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "release.json"
      - ".github/workflows/validate-release-metadata.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate-release-metadata:
    name: validate-release-metadata
    uses: runlix/build-workflow/.github/workflows/validate-release-metadata.yml@9f257a5ebb3ebef704e03f62708b4e890b92c61b
    with:
      release-json-path: release.json
