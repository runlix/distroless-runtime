name: Validate Release Metadata

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "release.json"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate-release-metadata:
    name: validate-release-metadata
    uses: runlix/build-workflow/.github/workflows/validate-release-metadata.yml@23bc20cf2238731861310f825c4577f273a617c2
    with:
      release-json-path: release.json
