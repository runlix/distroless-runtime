name: Validate Release Metadata

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "release.json"
      - ".github/workflows/validate-release-metadata.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release-metadata:
    name: validate-release-metadata
    uses: runlix/build-workflow/.github/workflows/validate-release-metadata.yml@d80ad1fee6a6f8f3f9809b50a5c3d1c5b3eaabaa
    with:
      release-json-path: release.json
      tool-image: ghcr.io/runlix/build-workflow-tools:sha-d80ad1fee6a6f8f3f9809b50a5c3d1c5b3eaabaa
