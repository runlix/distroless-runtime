name: Sync Release Metadata

on:
  workflow_run:
    workflows:
      - Release
    branches:
      - release
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  sync:
    uses: runlix/build-workflow/.github/workflows/sync-release-metadata.yml@f6cda05c2471728d19ced0928f78109e26e08c97
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools:sha-f6cda05c2471728d19ced0928f78109e26e08c97
