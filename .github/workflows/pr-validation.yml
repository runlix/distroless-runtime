name: PR Validation

on:
  pull_request:
    branches:
      - release
      - side/ci-v2-release
    types: [opened, synchronize, reopened]
    paths:
      - ".ci/config.json"
      - ".ci/docker-matrix.json"
      - ".ci/README.md"
      - "linux-*.Dockerfile"
      - ".github/workflows/pr-validation.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-validation:
    # Keep tooling-ref equal to the SHA pinned in uses:.
    uses: runlix/build-workflow/.github/workflows/pr-validation-v2.yml@a21b790251bd366c83b559f33626b32acfe1343b
    with:
      tooling-ref: a21b790251bd366c83b559f33626b32acfe1343b
      config-path: .ci/config.json
      legacy-matrix-path: .ci/docker-matrix.json
      validate-legacy-matrix: true
