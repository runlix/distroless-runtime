name: PR Validation

on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize, reopened]
    paths:
      - ".ci/config.json"
      - ".ci/*.sh"
      - ".dockerignore"
      - "linux-*.Dockerfile"
      - ".github/workflows/pr-validation.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    uses: runlix/build-workflow/.github/workflows/pr-validation.yml@f6cda05c2471728d19ced0928f78109e26e08c97
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools:sha-f6cda05c2471728d19ced0928f78109e26e08c97
