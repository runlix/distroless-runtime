name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.ci/docker-matrix.json'
      - '*.Dockerfile'
      - 'linux-*.Dockerfile'
  workflow_dispatch:

permissions:
  contents: read        # Checkout code and read docker-matrix.json
  pull-requests: write  # Comment on PR with build results

jobs:
  validate:
    uses: runlix/build-workflow/.github/workflows/build-images-rebuild.yml@main
    with:
      pr_mode: true
    secrets: inherit
