name: PR Validation

on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize, reopened]
    paths:
      - ".ci/config.json"
      - ".ci/README.md"
      - "linux-*.Dockerfile"
      - ".github/workflows/pr-validation.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-validation:
    uses: runlix/build-workflow/.github/workflows/pr-validation-v2.yml@2e7c3cf52b52c0f88d5fe16b4c1e85d1162cc2e5
    with:
      config-path: .ci/config.json
